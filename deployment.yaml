apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapps-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webapps

  template:
    metadata:
      labels:
        app: webapps

    spec:
      containers:
      - name: webapps
        image: dockerhubusername/webapps-demo:latest
        ports:
        - containerPort: 80